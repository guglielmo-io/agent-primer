name: Feature request
description: Suggest a focused improvement for Agent Primer.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Agent Primer do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Context generation
        - Verification and scoring
        - Repo map
        - OpenRouter planning
        - Desktop launcher
        - Documentation
    validations:
      required: true
